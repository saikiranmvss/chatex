# App-specific deployment configuration (sourced by deploy scripts)
APP_SLUG="${APP_SLUG:-chatex}"
APP_PORT="${APP_PORT:-5100}"
NODE_VERSION="${NODE_VERSION:-24}"
PACKAGE_MANAGER="${PACKAGE_MANAGER:-pnpm}"
# Monorepo: prod-only install omits mysql2/drizzle used by scripts/apply-migrations.mjs
FULL_PNPM_INSTALL="${FULL_PNPM_INSTALL:-true}"
SYSTEMD_UNIT="${SYSTEMD_UNIT:-chatex-api}"
HEALTH_PATH="${HEALTH_PATH:-/api/healthz}"
DB_ENGINE="${DB_ENGINE:-mysql}"
DB_NAME_DEFAULT="${DB_NAME_DEFAULT:-chatex}"

# Monorepo layout (relative to release root)
API_WORKDIR_REL="."
API_START_CMD="node --enable-source-maps artifacts/api-server/dist/index.mjs"
WEB_ROOT_REL="artifacts/nexus/dist/public"
UPLOAD_SYMLINK_REL="artifacts/api-server/uploads"
MIGRATION_CMD="node scripts/apply-migrations.mjs"
CLIENT_MAX_BODY_SIZE="${CLIENT_MAX_BODY_SIZE:-50m}"
ENABLE_WEBSOCKET="${ENABLE_WEBSOCKET:-true}"
